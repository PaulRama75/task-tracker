<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FER JSA - Saved Records</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, Helvetica, sans-serif; font-size: 13px; color: #000; background: #f0f0f0; }

  /* Toolbar */
  .toolbar { max-width: 1100px; margin: 10px auto 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 12px 20px; background: #1a3a5c; border-radius: 6px; }
  .toolbar h1 { color: #fff; font-size: 18px; margin: 0; }
  .toolbar .spacer { flex: 1; }
  .toolbar a, .toolbar button { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; color: #fff; text-decoration: none; display: inline-block; }
  .btn-new { background: #2e7d32; }
  .btn-new:hover { background: #1b5e20; }
  .btn-download { background: #f57c00; }
  .btn-download:hover { background: #e65100; }
  .btn-download:disabled { background: #999; cursor: not-allowed; }

  /* Container */
  .container { max-width: 1100px; margin: 12px auto; background: #fff; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); overflow: hidden; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 20px; padding: 14px 20px; background: #f5f8fb; border-bottom: 2px solid #1a3a5c; flex-wrap: wrap; }
  .stat-item { text-align: center; }
  .stat-value { font-size: 22px; font-weight: bold; color: #1a3a5c; }
  .stat-label { font-size: 11px; color: #666; }

  /* Filter bar */
  .filter-bar { padding: 12px 20px; border-bottom: 1px solid #e0e0e0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-bar input, .filter-bar select { padding: 7px 10px; border: 2px solid #c8d6e5; border-radius: 4px; font-size: 12px; font-family: inherit; }
  .filter-bar input:focus, .filter-bar select:focus { outline: none; border-color: #1a3a5c; }
  .filter-bar input[type="text"] { flex: 1; min-width: 150px; }
  .filter-bar input[type="date"] { width: 140px; }
  .filter-bar select { min-width: 130px; }
  .filter-bar label { font-size: 11px; color: #666; display: flex; align-items: center; gap: 4px; }
  .btn-clear { padding: 7px 14px; border: 1px solid #c8d6e5; border-radius: 4px; background: #fff; font-size: 12px; cursor: pointer; color: #666; }
  .btn-clear:hover { background: #f0f0f0; }

  /* Selection bar */
  .selection-bar { padding: 8px 20px; background: #fff3e0; border-bottom: 1px solid #ffe0b2; display: flex; align-items: center; gap: 12px; }
  .selection-bar.hidden { display: none; }
  .selection-bar span { font-size: 13px; font-weight: 600; color: #e65100; }

  /* Table */
  .records-table { width: 100%; border-collapse: collapse; }
  .records-table th { background: #1a3a5c; color: #fff; padding: 10px 14px; text-align: left; font-size: 12px; letter-spacing: 0.3px; }
  .records-table th:first-child { text-align: center; width: 40px; }
  .records-table td { padding: 10px 14px; border-bottom: 1px solid #e8ecf0; font-size: 12px; }
  .records-table tr:hover td { background: #eaf0f7; }
  .records-table tr:nth-child(even) td { background: #f9fbfd; }
  .records-table tr:nth-child(even):hover td { background: #eaf0f7; }
  .records-table tr.selected td { background: #fff3e0 !important; }
  .records-table td:nth-child(2) { font-weight: bold; color: #1a3a5c; text-align: center; }

  /* Checkbox */
  .row-check { width: 16px; height: 16px; cursor: pointer; }

  /* Status badges */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: bold; }
  .badge-size { background: #e3f2fd; color: #1565c0; }
  .badge-date { background: #f5f8fb; color: #333; border: 1px solid #c8d6e5; }

  /* Download link */
  .dl-link { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; background: #1a3a5c; color: #fff; text-decoration: none; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .dl-link:hover { background: #0d2840; }
  .del-link { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; background: #c62828; color: #fff; text-decoration: none; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; }
  .del-link:hover { background: #b71c1c; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: #999; }
  .empty-state .icon { font-size: 48px; margin-bottom: 10px; }
  .empty-state p { font-size: 15px; margin-bottom: 16px; }
  .empty-state a { color: #1a3a5c; font-weight: bold; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: #666; }

  @media screen and (max-width: 600px) {
    .toolbar { padding: 10px 12px; }
    .toolbar h1 { font-size: 14px; }
    .filter-bar { flex-direction: column; gap: 8px; }
    .filter-bar input[type="text"] { width: 100%; }
    .filter-bar input[type="date"] { width: 100%; }
    .filter-bar select { width: 100%; }
    .records-table th, .records-table td { padding: 6px 8px; font-size: 11px; }
    .stats-bar { gap: 10px; padding: 10px 12px; }
    .stat-value { font-size: 18px; }
  }

  @media print {
    .toolbar, .filter-bar, .selection-bar { display: none; }
    .container { box-shadow: none; margin: 0; }
    .dl-link { display: none; }
    .row-check { display: none; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>FER JSA - Saved Records</h1>
  <div class="spacer"></div>
  <button class="btn-download" id="btnDownloadSelected" disabled onclick="downloadSelected()">Download Selected (0)</button>
  <a href="/safety/form.html" class="btn-new" aria-label="Create new JSA form">+ New JSA Form</a>
</div>

<div class="container">
  <div class="stats-bar" id="statsBar">
    <div class="stat-item">
      <div class="stat-value" id="totalCount">--</div>
      <div class="stat-label">Total Records</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="todayCount">--</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="weekCount">--</div>
      <div class="stat-label">This Week</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="uniqueSites">--</div>
      <div class="stat-label">Unique Sites</div>
    </div>
  </div>

  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="Search by site or description..." oninput="applyFilters()" aria-label="Search">
    <select id="filterSite" onchange="applyFilters()" aria-label="Filter by site">
      <option value="">All Sites</option>
    </select>
    <label>From: <input type="date" id="filterDateFrom" onchange="applyFilters()"></label>
    <label>To: <input type="date" id="filterDateTo" onchange="applyFilters()"></label>
    <button class="btn-clear" onclick="clearFilters()">Clear Filters</button>
  </div>

  <div class="selection-bar hidden" id="selectionBar">
    <input type="checkbox" id="selectAll" class="row-check" onchange="toggleSelectAll(this.checked)">
    <span id="selectionCount">0 selected</span>
    <button class="btn-download" onclick="downloadSelected()" style="padding:5px 14px;font-size:12px;">Download Selected</button>
    <button class="del-link" id="btnDeleteSelected" onclick="deleteSelected()" style="display:none;padding:5px 14px;font-size:12px;">Delete Selected</button>
  </div>

  <div id="tableContainer">
    <div class="loading">Loading records...</div>
  </div>
</div>

<script>
  function getToken() {
    try { if (window.parent && window.parent.authToken) return window.parent.authToken; } catch(e) {}
    try { const t = localStorage.getItem('authToken'); if (t) return t; } catch(e) {}
    try { const t = window.parent.sessionStorage.getItem('authToken'); if (t) return t; } catch(e) {}
    try { return sessionStorage.getItem('authToken') || ''; } catch(e) {}
    return '';
  }
  function authFetch(url, opts = {}) {
    if (!opts.headers) opts.headers = {};
    opts.headers['Authorization'] = 'Bearer ' + getToken();
    return fetch(url, opts);
  }

  async function downloadPdf(id) {
    try {
      const res = await authFetch('/safety/api/jsa-records/' + id + '/pdf');
      if (!res.ok) { alert('Download failed'); return; }
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'JSA_' + id + '.pdf';
      a.click();
      URL.revokeObjectURL(a.href);
    } catch(e) { alert('Download failed: ' + e.message); }
  }

  let allRecords = [];
  let filteredRecords = [];
  let selectedIds = new Set();
  let isSuperAdmin = false;

  async function checkUserRole() {
    try {
      const res = await authFetch('/safety/api/me');
      if (res.ok) {
        const user = await res.json();
        isSuperAdmin = user.role === 'superadmin';
      }
    } catch(e) {}
    // Also check parent window
    try {
      if (window.parent && window.parent.currentUser) {
        const pu = window.parent.currentUser;
        if (pu.role === 'superadmin') isSuperAdmin = true;
      }
    } catch(e) {}
    try {
      const stored = localStorage.getItem('currentUser');
      if (stored) {
        const u = JSON.parse(stored);
        if (u.role === 'superadmin') isSuperAdmin = true;
      }
    } catch(e) {}
  }

  async function loadRecords() {
    try {
      await checkUserRole();
      const res = await authFetch('/safety/api/jsa-records');
      allRecords = await res.json();
      updateStats();
      populateSiteFilter();
      applyFilters();
    } catch (err) {
      document.getElementById('tableContainer').innerHTML =
        '<div class="empty-state"><div class="icon">&#9888;</div><p>Failed to load records</p></div>';
    }
  }

  function populateSiteFilter() {
    const sites = [...new Set(allRecords.map(r => r.site_name))].sort();
    const sel = document.getElementById('filterSite');
    sel.innerHTML = '<option value="">All Sites</option>' +
      sites.map(s => '<option value="' + escapeHtml(s) + '">' + escapeHtml(s) + '</option>').join('');
  }

  function updateStats() {
    const now = new Date();
    const todayStr = now.toISOString().slice(0, 10);
    const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);

    const today = allRecords.filter(r => r.saved_at.slice(0, 10) === todayStr).length;
    const week = allRecords.filter(r => new Date(r.saved_at) >= weekAgo).length;
    const sites = new Set(allRecords.map(r => r.site_name)).size;

    document.getElementById('totalCount').textContent = allRecords.length;
    document.getElementById('todayCount').textContent = today;
    document.getElementById('weekCount').textContent = week;
    document.getElementById('uniqueSites').textContent = sites;
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const site = document.getElementById('filterSite').value;
    const dateFrom = document.getElementById('filterDateFrom').value;
    const dateTo = document.getElementById('filterDateTo').value;

    filteredRecords = allRecords.filter(r => {
      if (q && !r.site_name.toLowerCase().includes(q) &&
          !(r.description_of_work && r.description_of_work.toLowerCase().includes(q))) return false;
      if (site && r.site_name !== site) return false;
      if (dateFrom && r.saved_at.slice(0, 10) < dateFrom) return false;
      if (dateTo && r.saved_at.slice(0, 10) > dateTo) return false;
      return true;
    });

    renderTable(filteredRecords);
  }

  function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('filterSite').value = '';
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value = '';
    applyFilters();
  }

  function renderTable(records) {
    const container = document.getElementById('tableContainer');
    const selBar = document.getElementById('selectionBar');

    if (records.length === 0) {
      selBar.classList.add('hidden');
      container.innerHTML = '<div class="empty-state"><div class="icon">&#128196;</div><p>No JSA records found</p><a href="/safety/form.html">+ Create New JSA Form</a></div>';
      return;
    }

    selBar.classList.remove('hidden');

    let html = '<table class="records-table"><thead><tr>' +
      '<th><input type="checkbox" class="row-check" id="headerCheck" onchange="toggleSelectAll(this.checked)"></th>' +
      '<th>ID</th><th>Site Name</th><th>Description of Work</th><th>Date & Time</th><th>Size</th><th>Action</th>' +
      '</tr></thead><tbody>';

    records.forEach(r => {
      const d = new Date(r.saved_at);
      const dateStr = d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const sizeKB = (r.file_size / 1024).toFixed(1);
      const checked = selectedIds.has(r.id) ? ' checked' : '';
      const selClass = selectedIds.has(r.id) ? ' selected' : '';

      const delBtn = isSuperAdmin ? ' <button class="del-link" onclick="deleteRecord(' + r.id + ')">&#128465; Delete</button>' : '';

      html += '<tr class="' + selClass + '">' +
        '<td style="text-align:center;"><input type="checkbox" class="row-check" data-id="' + r.id + '"' + checked + ' onchange="toggleSelect(' + r.id + ', this.checked)"></td>' +
        '<td>' + r.id + '</td>' +
        '<td><strong>' + escapeHtml(r.site_name) + '</strong></td>' +
        '<td>' + escapeHtml(r.description_of_work || '-') + '</td>' +
        '<td><span class="badge badge-date">' + dateStr + '</span><br><span style="font-size:11px;color:#666;">' + timeStr + '</span></td>' +
        '<td><span class="badge badge-size">' + sizeKB + ' KB</span></td>' +
        '<td><a href="#" onclick="downloadPdf(' + r.id + ');return false;" class="dl-link">&#128229; Download</a>' + delBtn + '</td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    container.innerHTML = html;
    updateSelectionUI();
  }

  function toggleSelect(id, checked) {
    if (checked) { selectedIds.add(id); } else { selectedIds.delete(id); }
    // Update row highlight
    const row = document.querySelector('input[data-id="' + id + '"]');
    if (row) row.closest('tr').classList.toggle('selected', checked);
    updateSelectionUI();
  }

  function toggleSelectAll(checked) {
    const checkboxes = document.querySelectorAll('.records-table .row-check[data-id]');
    checkboxes.forEach(cb => {
      const id = parseInt(cb.dataset.id);
      cb.checked = checked;
      if (checked) { selectedIds.add(id); } else { selectedIds.delete(id); }
      cb.closest('tr').classList.toggle('selected', checked);
    });
    // Sync header checkboxes
    const headerCheck = document.getElementById('headerCheck');
    const selectAll = document.getElementById('selectAll');
    if (headerCheck) headerCheck.checked = checked;
    if (selectAll) selectAll.checked = checked;
    updateSelectionUI();
  }

  function updateSelectionUI() {
    const count = selectedIds.size;
    const btn = document.getElementById('btnDownloadSelected');
    const countEl = document.getElementById('selectionCount');
    const delBtn = document.getElementById('btnDeleteSelected');
    btn.disabled = count === 0;
    btn.textContent = 'Download Selected (' + count + ')';
    if (countEl) countEl.textContent = count + ' selected';
    if (delBtn) delBtn.style.display = (isSuperAdmin && count > 0) ? '' : 'none';
  }

  async function downloadSelected() {
    if (selectedIds.size === 0) return;
    const ids = [...selectedIds];
    for (let i = 0; i < ids.length; i++) {
      await downloadPdf(ids[i]);
      if (ids.length > 1 && i < ids.length - 1) {
        await new Promise(resolve => setTimeout(resolve, 500));
      }
    }
  }

  async function deleteRecord(id) {
    if (!confirm('Are you sure you want to permanently delete JSA record #' + id + '? This cannot be undone.')) return;
    try {
      const res = await authFetch('/safety/api/jsa-records/' + id, { method: 'DELETE' });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.error || 'Delete failed');
        return;
      }
      allRecords = allRecords.filter(r => r.id !== id);
      selectedIds.delete(id);
      updateStats();
      applyFilters();
    } catch(e) { alert('Delete failed: ' + e.message); }
  }

  async function deleteSelected() {
    if (selectedIds.size === 0) return;
    if (!confirm('Are you sure you want to permanently delete ' + selectedIds.size + ' record(s)? This cannot be undone.')) return;
    const ids = [...selectedIds];
    let deleted = 0;
    for (const id of ids) {
      try {
        const res = await authFetch('/safety/api/jsa-records/' + id, { method: 'DELETE' });
        if (res.ok) {
          allRecords = allRecords.filter(r => r.id !== id);
          selectedIds.delete(id);
          deleted++;
        }
      } catch(e) {}
    }
    updateStats();
    applyFilters();
    alert(deleted + ' record(s) deleted.');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Load on page ready
  loadRecords();
</script>
</body>
</html>
